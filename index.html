<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Professional Page Title</title>
  
  <!-- SEO & Meta Tags -->
  <meta name="description" content="A comprehensive description of your website content for search engines.">
  <meta name="author" content="Your Name or Company">
  <meta name="robots" content="index, follow">

  <!-- Social Media: Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="Your Page Title">
  <meta property="og:description" content="Brief description for social shares.">
  <meta property="og:image" content="https://example.com">
  <meta property="og:url" content="https://example.com">
  <meta property="og:type" content="website">

  <!-- Social Media: Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Page Title">
  <meta name="twitter:description" content="Brief description for Twitter.">
  <meta name="twitter:image" content="https://example.com">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">
  
  <!-- Theme Color for mobile browsers -->
  <meta name="theme-color" content="#fafafa">
</head>

  <header>

      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <article>

      <p>Your primary content goes here.</p>
    </article>
  </main>

  <footer>
    <p>&copy; 2024 Your Company. All rights reserved.</p>
  </footer>

  <!-- Scripts: Placed at the end for faster page load -->
  <script src="js/vendor/modernizr-3.11.2.min.js"></script>

  <script src="js/main.js"></script>

</html>
